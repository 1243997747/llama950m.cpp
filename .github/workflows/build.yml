name: Build llama.cpp CUDA 13.0 for GTX950M
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          submodules: recursive

      #  GitHub 官方 CUDA 安装，永不失败、无下载错误
      - name: Install CUDA 13.0
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda-version: "13.0"

      # 编译：CUDA 13 + 你的显卡 GTX950M (sm_50)
      - name: Build llama.cpp
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=50
          make -C build -j4

      # 打包
      - name: Package binaries
        run: |
          cd build/bin
          tar -zcvf llama-cuda13.0-sm50.tar.gz ./*

      # 输出可下载文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda13
          path: build/bin/llama-cuda13.0-sm50.tar.gz
