name: Build llama.cpp CUDA 12.2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 llama.cpp 源码
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          submodules: recursive

      - name: 安装 CUDA 12.2
        run: |
          wget -q https://developer.download.nvidia.com/cuda/12.2.0/local_installers/cuda_12.2.0_535.54.03_linux.run
          sudo sh cuda_12.2.0_535.54.03_linux.run --toolkit --silent
          echo "/usr/local/cuda-12.2/bin" >> $GITHUB_PATH

      - name: 编译（支持 GTX950M）
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=50
          make -C build -j4

      - name: 打包
        run: |
          cd build/bin
          tar -zcvf llama-cuda12.2.tar.gz ./*

      - name: 上传文件
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda12.2
          path: build/bin/llama-cuda12.2.tar.gz
