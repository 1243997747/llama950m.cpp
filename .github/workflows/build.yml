name: Build llama.cpp CUDA for GTX950M
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          submodules: recursive

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake build-essential

      - name: Build llama.cpp (GPU sm_50)
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=50
          make -C build -j4

      - name: Package binaries
        run: cd build/bin && tar -zcvf llama-cuda-sm50.tar.gz ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda
          path: build/bin/llama-cuda-sm50.tar.gz
