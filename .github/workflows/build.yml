name: Build llama.cpp CUDA 13.0
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          submodules: recursive

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake build-essential

      - name: Download CUDA 13.0
        run: wget https://developer.download.nvidia.com/compute/cuda/13.0.0/local_installers/cuda_13.0.0_530.30.02_linux.run

      - name: Install CUDA 13.0
        run: sudo sh cuda_13.0.0_530.30.02_linux.run --toolkit --silent

      - name: Add CUDA to PATH
        run: echo "PATH=/usr/local/cuda-13.0/bin:$PATH" >> $GITHUB_ENV

      - name: Build llama.cpp
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=50
          make -C build -j4

      - name: Package
        run: cd build/bin && tar -zcvf llama-cuda13.tar.gz ./*

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llama-cuda13
          path: build/bin/llama-cuda13.tar.gz
