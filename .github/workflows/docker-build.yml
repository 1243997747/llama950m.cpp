name: Build llama.cpp Docker CUDA12.5 sm50
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载编译好的 llama.cpp
        run: |
          wget -O llama.tar.gz https://github.com/leejet/llama.cpp-ci/releases/download/cuda12.5-sm50/llama-cuda12.5-sm50.tar.gz
          tar -zxvf llama.tar.gz

      - name: 构建 Docker 镜像
        run: |
          echo "FROM nvidia/cuda:12.1.1-runtime-ubuntu22.04" > Dockerfile
          echo "COPY bin/* /usr/local/bin/" >> Dockerfile
          echo 'ENTRYPOINT ["/usr/local/bin/llama-server"]' >> Dockerfile
          docker build -t llama-cuda12.5-sm50 .

      - name: 登录 GitHub 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传镜像
        run: |
          TAG=ghcr.io/${{ github.actor }}/llama-cuda12.5-sm50:latest
          docker tag llama-cuda12.5-sm50 $TAG
          docker push $TAG
