name: Build CUDA Docker (sm_50)

on:
  # 允许手动触发
  workflow_dispatch:
  # 也可以设置为 push 到 main 分支时自动触发
  push:
    branches: [ main ]

jobs:
  build:
    # 必须使用 Ubuntu 最新环境
    runs-on: ubuntu-latest
    # 权限：允许写入 GitHub 的容器仓库 (GHCR)
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker 环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到 GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 构建并推送
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.actor }}/llama-cuda-sm50:latest
          # 关键：这里传递构建参数，确保 CI 知道我们要编译 CUDA 版本
          # (虽然 Dockerfile 里已经写死了，但这样更灵活)
          build-args: |
            CUDA=1
